{% extends "otree/Page.html" %}
{% load otree static %}

{% block global_styles %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
<style>
  body {
    background: #f4f4f8 !important;
    color: #111118;
    font-family: 'Inter', sans-serif;
  }
  /* oTree injects its own navbar — hide it for a cleaner look */
  .otree-nav { display: none !important; }

  .container { max-width: 660px !important; }

  /* Cards */
  .card {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.07) !important;
    border-radius: 12px !important;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .card-body { padding: 22px 26px; }

  /* Eyebrow labels */
  .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #a0a0b8;
    margin-bottom: 12px;
  }

  /* Progress bar */
  .progress {
    height: 2px !important;
    background: rgba(0,0,0,0.08) !important;
    border-radius: 2px;
  }
  .progress-bar {
    background: #111118 !important;
    transition: width 0.6s ease;
  }

  /* Buttons */
  .btn-primary {
    background: #111118 !important;
    border-color: #111118 !important;
    color: #ffffff !important;
    border-radius: 8px !important;
    padding: 11px 28px !important;
    font-weight: 600 !important;
    font-family: 'Inter', sans-serif;
    transition: background 0.15s ease, transform 0.12s ease;
  }
  .btn-primary:hover:not(:disabled) {
    background: #2a2a38 !important;
    border-color: #2a2a38 !important;
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0) !important; }
  .btn-primary:disabled { opacity: 0.35 !important; }

  .btn-outline-secondary {
    color: #6a6a80 !important;
    border-color: rgba(0,0,0,0.15) !important;
    background: transparent !important;
    border-radius: 8px !important;
    padding: 11px 20px !important;
    font-weight: 500 !important;
  }
  .btn-outline-secondary:hover { background: rgba(0,0,0,0.04) !important; }

  /* Slider */
  .form-range::-webkit-slider-thumb { background: #111118; }
  .form-range::-moz-range-thumb { background: #111118; }

  /* Badge */
  .badge.bg-secondary {
    background: rgba(0,0,0,0.08) !important;
    color: #4a4a60 !important;
    font-weight: 600;
    font-size: 0.8rem;
  }

  /* Alert / definition box */
  .alert-secondary {
    background: #ffffff !important;
    border: 1px solid rgba(0,0,0,0.07) !important;
    border-radius: 10px !important;
    color: #4a4a60;
  }

  /* Form labels and inputs */
  .form-label { font-weight: 600; color: #111118; }
  .form-control, .form-select {
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px;
  }
  .form-control:focus, .form-select:focus {
    border-color: #111118;
    box-shadow: 0 0 0 3px rgba(17,17,24,0.08);
  }
</style>
{% endblock %}

{% block global_scripts %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
{% endblock %}
